name: Build Wild Jacks APK

on:
  workflow_dispatch:  # Kan startes manuelt

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: cd Sequence && flutter pub get

      - name: Build APK
        run: cd Sequence && flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wild-jacks-online-apk
          path: Sequence/build/app/outputs/flutter-apk/app-release.apk
