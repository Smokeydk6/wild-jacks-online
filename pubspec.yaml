name: sequence 
description: "A Flutter application for [your app purpose]."

publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  playing_cards: ^0.4.2
  http: ^1.2.2
  url_launcher: ^6.2.5
  supabase_flutter: ^2.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  # image: "assets/icons/splash_logo.png"  # Removed until you add this file
  android: true
  ios: true

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/logo.png
    # - assets/icons/splash_logo.png  # Uncomment when you add this file
    - assets/images/